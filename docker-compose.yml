services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: inspection_user
      POSTGRES_PASSWORD: inspection_pass
      POSTGRES_DB: inspection_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inspection_user -d inspection_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://inspection_user:inspection_pass@db:5432/inspection_db
      SECRET_KEY: ${SECRET_KEY:-dev_secret_change_me}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/ai_models/weights:/app/ai_models/weights
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"

volumes:
  pgdata:
